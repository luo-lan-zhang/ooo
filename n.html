<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>综合APP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, sans-serif}
body{background:#f6f7f9;padding-bottom:70px}

/* 登录 */
#login{position:fixed;inset:0;background:#0f172a;display:flex;align-items:center;justify-content:center;padding:24px;z-index:9999}
.login-card{width:100%;max-width:380px;background:#1e293b;border-radius:20px;padding:40px 28px}
.login-card h2{color:#fff;text-align:center;margin-bottom:32px}
.login-card input{width:100%;height:50px;background:#2a3756;border:none;border-radius:12px;margin-bottom:16px;color:#fff;padding:0 16px}
.login-card button{width:100%;height:52px;background:linear-gradient(90deg,#3b82f6,#1d4ed8);border:none;border-radius:12px;color:#fff}

/* 页面 */
.page{display:none}
.page.active{display:block}

/* 首页 */
#home{padding:20px}
.home-title{font-size:26px;margin-bottom:20px}
.upload-card{background:#fff;border-radius:16px;padding:24px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.05)}

/* 洗鞋 */
.xie-head{padding:20px;background:#fff;font-size:20px;font-weight:600}
.xie-banner{height:180px;margin:16px;border-radius:16px;overflow:hidden}
.xie-banner img{width:100%;height:100%;object-fit:cover}
.xie-btns{display:flex;gap:12px;padding:0 16px}
.xie-btns button{flex:1;height:50px;border-radius:14px;border:none;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.xie-vip{background:#fff9e6;margin:16px;padding:18px;border-radius:14px;display:flex;justify-content:space-between}
.xie-vip button{background:#3b82f6;color:#fff;border:none;padding:10px 18px;border-radius:30px}
.xie-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px}
.xie-grid button{height:64px;border-radius:14px;border:none;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.04)}

/* 恋爱 */
.love-banner{position:relative;height:220px}
.love-banner img{width:100%;height:100%;object-fit:cover}
.love-banner .text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;text-align:center}
.love-search{display:flex;gap:12px;padding:20px}
.love-search input{flex:1;height:52px;border-radius:26px;border:none;padding:0 20px}
.love-search button{width:120px;border-radius:26px;background:#ff69b4;color:#fff;border:none}
.love-icons{display:grid;grid-template-columns:repeat(4,1fr);padding:20px;text-align:center}
.love-icon{width:64px;height:64px;border-radius:50%;background:#ff69b4;margin:0 auto 8px;display:grid;place-items:center;color:#fff;font-size:26px}

/* 游戏页面（修复高度！网站+APP都能显示）*/
#game{display:none;background:#1a1a2e;min-height:600px;padding-bottom:20px}
.game-ui{text-align:center;color:#fff;font-size:20px;padding:20px 0;font-weight:bold}
#gameCanvas{display:block;margin:0 auto;width:100%;height:520px;background:#1a1a2e}
.game-over{background:rgba(0,0,0,.8);color:#fff;display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:40px}
.game-over button{background:#3b82f6;color:#fff;border:none;padding:14px 30px;border-radius:12px}

/* 我的 */
#user{padding:40px 20px;text-align:center}
.user-avatar{width:120px;height:120px;border-radius:50%;object-fit:cover;margin:0 auto 20px}

/* 底部导航 */
.tabbar{position:fixed;left:0;bottom:0;width:100%;height:70px;background:#fff;display:flex;align-items:center;box-shadow:0 -2px 10px rgba(0,0,0,.05)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;color:#888}
.tab.active{color:#3b82f6;font-weight:500}
</style>
</head>

<body>

<!-- 登录 -->
<div id="login">
  <div class="login-card">
    <h2>登录</h2>
    <input placeholder="账号" id="user">
    <input type="password" placeholder="密码" id="pwd">
    <button onclick="login()">登录</button>
  </div>
</div>

<!-- 主内容 -->
<div id="main" style="display:none;">

  <!-- 首页 -->
  <div id="home" class="page active">
    <div class="home-title">首页</div>
    <div class="upload-card">上传图片/视频/文件</div>
  </div>

  <!-- 洗鞋 -->
  <div id="xixie" class="page">
    <div class="xie-head">洗鞋服务</div>
    <div class="xie-banner"><img src="https://picsum.photos/800/400?shoes"></div>
    <div class="xie-btns">
      <button>我要洗鞋</button><button>附近网点</button><button>扫码开柜</button>
    </div>
    <div class="xie-vip">
      <div>开通会员享优惠</div>
      <button>立即开通</button>
    </div>
    <div class="xie-grid">
      <button>预约上门</button><button>分享赚钱</button><button>新人特惠</button><button>鞋子修复</button>
    </div>
  </div>

  <!-- 恋爱 -->
  <div id="love" class="page">
    <div class="love-banner">
      <img src="https://picsum.photos/800/500?love">
      <div class="text">
        <h2>春节过年回家<br>你还要一个人吗？</h2>
        <p>500W+恋爱话术库</p>
      </div>
    </div>
    <div class="love-search">
      <input placeholder="输入TA说的话">
      <button>一键查找</button>
    </div>
    <div class="love-icons">
      <div><div class="love-icon">🖼️</div>为TA写诗</div>
      <div><div class="love-icon">😀</div>表情包</div>
      <div><div class="love-icon">♢</div>激活会员</div>
      <div><div class="love-icon">🎧</div>AI导师</div>
    </div>
  </div>

  <!-- 游戏（已修复！）-->
  <div id="game" class="page">
    <div class="game-ui">第 <span id="level">1</span> 关 | 分数：<span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>
    <div class="game-over" id="gameOver">
      <h2>游戏结束</h2>
      <p>得分：<span id="final">0</span></p>
      <button onclick="restartGame()">再来一局</button>
    </div>
  </div>

  <!-- 我的 -->
  <div id="user" class="page">
    <img src="https://picsum.photos/200/200?boy" class="user-avatar">
    <h3>个人中心</h3>
  </div>

  <!-- 底部导航 -->
  <div class="tabbar">
    <div class="tab active" onclick="go('home')">首页</div>
    <div class="tab" onclick="go('xixie')">洗鞋</div>
    <div class="tab" onclick="go('love')">恋爱</div>
    <div class="tab" onclick="go('game')">游戏</div>
    <div class="tab" onclick="go('user')">我的</div>
  </div>

</div>

<script>
// 登录
function login(){
  document.getElementById("login").style.display = "none";
  document.getElementById("main").style.display = "block";
}

// 页面切换
function go(id){
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  event.currentTarget.classList.add("active");
  if(id === "game") startGame();
}

// ================== 跳一跳游戏（100%可运行版）==================
let canvas, ctx, player, platforms, score, level, gameOver, power, hold = false;

function startGame(){
  canvas = document.getElementById("gameCanvas");
  ctx = canvas.getContext("2d");
  canvas.width = canvas.offsetWidth;
  canvas.height = 520;

  score = 0;
  level = 1;
  gameOver = false;
  power = 0;

  player = { x:60, y:420, w:28, h:40, vy:0, jump:false };
  platforms = [];
  let x = 40;
  for(let i=0;i<999;i++){
    platforms.push({
      x:x, y:460 - Math.random()*50, w:110, h:20
    });
    x += 220 + Math.random()*80;
  }

  document.getElementById("gameOver").style.display = "none";
  canvas.addEventListener("mousedown",()=>hold=true);
  canvas.addEventListener("mouseup",jump);
  canvas.addEventListener("touchstart",()=>hold=true);
  canvas.addEventListener("touchend",jump);
  loop();
}

function loop(){
  if(gameOver) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#222";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  platforms.forEach(p=>{
    ctx.fillStyle="#4299e1";
    ctx.fillRect(p.x,p.y,p.w,p.h);
  });

  // 小人
  ctx.fillStyle="#ff6b81";
  ctx.fillRect(player.x,player.y,player.w,player.h);
  ctx.fillStyle="#fff";
  ctx.fillRect(player.x+6,player.y+6,5,5);
  ctx.fillRect(player.x+17,player.y+6,5,5);

  player.y += player.vy;
  player.vy += 0.6;

  let land = false;
  platforms.forEach(p=>{
    if(player.x+28>p.x && player.x<p.x+p.w && player.y+40>p.y && player.y+40<p.y+10 && player.vy>0){
      player.y=p.y-40;
      player.vy=0;
      player.jump=false;
      land=true;
      score+=Math.floor(power);
      power=0;
      if(score>level*150)level++;
      updateUI();
    }
  });

  if(player.y>600){
    gameOver=true;
    document.getElementById("final").innerText=score;
    document.getElementById("gameOver").style.display="flex";
  }

  requestAnimationFrame(loop);
}

function jump(){
  if(!hold || player.jump) return;
  hold=false;
  player.vy=-power;
  player.jump=true;
}

function updateUI(){
  document.getElementById("level").innerText=level;
  document.getElementById("score").innerText=score;
}

function restartGame(){
  startGame();
}
</script>
</body>
</html>
